@let items = collection();
@let loading = isLoading();
@let prepared = isListShowed();
@let searchedWords = searchedPattern();

<div #wrapper class="wrapper">
    @if (loading || (!prepared)) {
        <x-page-loading-indicator class="loading-indicator" />
    }

    @if (!loading && prepared) {
        <div class="overlay">
            <x-book-scroll-to-start-button localeSensitive class="scroll-to-end" [ngClass]="{show: showScrollToStart()}"
                (onClick)="onScrollToStartClickHandler()">
            </x-book-scroll-to-start-button>
        </div>
    }

    <ng-virtual-list #list class="list" [ngClass]="listClass()" [items]="items" [itemRenderer]="itemRenderer"
        [snapScrollToEnd]="false" [dynamicSize]="false" itemSize="viewport" [bufferSize]="5" [maxBufferSize]="5"
        collectionMode="lazy" [stickyEnabled]="true" [defaultItemValue]="defaultItemValue()" [snapToItem]="true"
        snapToItemAlign="end" snappingDistance="10%" [scrollStartOffset]="scrollStartOffset()"
        [scrollEndOffset]="scrollEndOffset()" [snapToEndTransitionInstantOffset]="1" [motionBlurEnabled]="true"
        [scrollbarThumbRenderer]="customScrollBarThumb" [scrollbarThumbParams]="scrollbarTheme()"
        [selectByClick]="false" [scrollingSettings]="scrollingSettings" [loading]="isLazyLoading()"
        [animationParams]="animationParams" (onScrollReachEnd)="onScrollReachEndHandler()"
        (onScroll)="onScrollHandler($event)" (onScrollEnd)="onScrollHandler($event)">
    </ng-virtual-list>

    <ng-template #itemRenderer let-index="index" let-data="data" let-prevData="prevData" let-nextData="nextData"
        let-measures="measures" let-config="config" let-reseted="reseted" let-api="api">
        <div staticClick [maxStaticClickDistance]="maxStaticClickDistance"
            (onStaticClick)="api.select(data.id, data.edited ? true : undefined)">
            @if (data?.data) {
                <x-page-box [reseted]="reseted" [data]="data" [config]="config" [measures]="measures" [prevData]="prevData"
                    [nextData]="nextData" [searchPattern]="searchedWords" [api]="api" />
            }
        </div>
    </ng-template>

    <ng-template #customScrollBarThumb let-api="api" let-width="width" let-height="height"
        let-fillPositions="fillPositions" let-params="params">
        <custom-scrollbar [api]="api" [width]="width" [height]="height" [fillPositions]="fillPositions"
            [params]="params"></custom-scrollbar>
    </ng-template>
</div>
